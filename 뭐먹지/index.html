<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐 먹지 - 음식 추천</title>
    <link rel="shortcut icon" href="#"> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        /* 영수증 전용 폰트 (타자기 느낌) */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            background-color: #F9F9F9;
        }

        #app-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #slider {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .screen {
            flex: 0 0 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            word-break: keep-all;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-img {
            width: 200px;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .start-btn {
            margin-top: 50px;
            font-size: 22px;
            padding: 15px 40px;
            border-radius: 30px;
            background-color: #FFCC00;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 204, 0, 0.4);
            transition: all 0.2s;
            animation: bounce 2s infinite; 
        }
        .start-btn:hover, .start-btn:active {
            transform: scale(0.95);
            background-color: #e6b800;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 500px;
        }
        .choice-btn {
            background-color: #fff;
            border: 2px solid #FFCC00;
            border-radius: 15px;
            padding: 15px 25px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .choice-btn:hover, .choice-btn:active {
            background-color: #FFCC00;
            color: #fff;
        }

        input[type="number"], input[type="text"] {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            margin-bottom: 20px;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #FFCC00;
        }
        .action-btn {
            background-color: #FFCC00;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 204, 0, 0.3);
            margin-top: 10px;
        }
