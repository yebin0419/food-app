<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐 먹지 - 음식 추천</title>
    <link rel="shortcut icon" href="#"> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        /* --- ✨ 무빙 그라데이션 애니메이션 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #fdfbfb, #fff5d1, #ffebc2, #ffe0cc);
            background-size: 400% 400%;
            animation: movingGradient 15s ease infinite;
        }

        @keyframes movingGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #slider {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .screen {
            flex: 0 0 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            word-break: keep-all;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-img {
            width: 200px;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* --- ✨ 타이핑 효과 스타일 --- */
        #typing-container {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #555;
            min-height: 30px; 
            display: flex;
            align-items: center;
        }
        .cursor {
            display: inline-block;
            width: 3px;
            height: 22px;
            background-color: #FFCC00;
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .start-btn {
            margin-top: 40px;
            font-size: 22px;
            padding: 15px 40px;
            border-radius: 30px;
            background-color: #FFCC00;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 204, 0, 0.4);
            transition: all 0.2s;
            animation: bounce 2s infinite; 
        }
        .start-btn:hover, .start-btn:active {
            transform: scale(0.95);
            background-color: #e6b800;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 500px;
        }
        .choice-btn {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border: 2px solid #FFCC00;
            border-radius: 15px;
            padding: 15px 25px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .choice-btn:hover, .choice-btn:active {
            background-color: #FFCC00;
            color: #fff;
        }

        input[type="number"], input[type="text"] {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            margin-bottom: 20px;
            font-family: inherit;
            background-color: rgba(255, 255, 255, 0.9);
        }
        input:focus {
            outline: none;
            border-color: #FFCC00;
        }
        .action-btn {
            background-color: #FFCC00;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 204, 0, 0.3);
            margin-top: 10px;
        }

        #ingredient-msg {
            font-weight: bold;
            color: #FF9800;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
            text-align: center;
        }

        /* --- 힙한 영수증 UI 스타일 --- */
        #result-container {
            width: 100%;
            max-width: 400px;
            max-height: 65vh;
            overflow-y: auto;
            margin-bottom: 20px;
            scrollbar-width: none; 
        }
        #result-container::-webkit-scrollbar { display: none; }

        .receipt-paper {
            background-color: #fdfdfd;
            padding: 30px 20px;
            margin: 10px auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
            position: relative;
            font-family: 'Courier Prime', monospace;
            text-align: left;
            color: #222;
            border: 1px solid #eaeaea;
            border-top: 4px solid #D32F2F; 
        }
        .receipt-paper::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(135deg, transparent 50%, #fdfdfd 50%), linear-gradient(-135deg, transparent 50%, #fdfdfd 50%);
            background-size: 15px 15px;
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .receipt-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .receipt-info { font-size: 13px; color: #666; margin: 3px 0; }
        .receipt-item { margin-bottom: 20px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; font-size: 17px; font-weight: bold; margin-bottom: 6px; }
        .item-medal { font-size: 20px; margin-right: 5px; }
        .item-reason {
            font-size: 13px; color: #555; line-height: 1.5; font-family: 'Noto Sans KR', sans-serif; 
            padding-left: 5px; border-left: 2px solid #eee;
        }
        .receipt-footer { border-top: 2px dashed #ccc; padding-top: 20px; text-align: center; }
        .total-msg { font-size: 18px; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; color: #D32F2F; margin-bottom: 15px; }
        .barcode { font-size: 35px; font-weight: normal; letter-spacing: 2px; color: #111; opacity: 0.8; margin-top: 5px; }

        /* --- ✨ 귀염뽀짝 회색 냄비 애니메이션 --- */
        .pot-container { 
            position: relative; 
            width: 140px; 
            height: 120px; 
            margin-bottom: 30px; 
            display: flex;
            justify-content: center;
        }
        .pot-body { 
            position: absolute; 
            bottom: 0; 
            width: 100px; 
            height: 70px; 
            background: #9E9E9E; 
            border-radius: 20px 20px 40px 40px; 
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.1); 
            z-index: 2;
        }
        .pot-handle {
            position: absolute;
            bottom: 30px;
            width: 130px;
            height: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 1;
        }
        .pot-handle::before, .pot-handle::after {
            content: '';
            width: 25px;
            height: 20px;
            background: #757575; 
            border-radius: 10px;
        }
        .pot-face {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }
        .pot-face::before, .pot-face::after {
            content: '';
            width: 7px;
            height: 7px;
            background: #444; 
            border-radius: 50%;
        }
        .pot-mouth {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 5px;
            border-bottom: 3px solid #444;
            border-radius: 0 0 10px 10px;
            z-index: 3;
        }
        .pot-blush {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }
        .pot-blush::before, .pot-blush::after {
            content: '';
            width: 12px;
            height: 6px;
            background: rgba(255, 120, 120, 0.5);
            border-radius: 50%;
        }
        .pot-lid { 
            position: absolute; 
            bottom: 63px; 
            width: 106px; 
            height: 25px; 
            background: #E0E0E0; 
            border-radius: 30px 30px 0 0; 
            animation: lid-dance 0.4s infinite alternate; 
            z-index: 4;
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.05);
        }
        .pot-lid::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 12px;
            background: #757575; 
            border-radius: 10px 10px 0 0;
        }
        @keyframes lid-dance { to { transform: translateY(-6px) rotate(4deg); } }
        .steam { 
            position: absolute; 
            bottom: 70px; 
            width: 20px; 
            height: 20px; 
            background: rgba(255, 255, 255, 0.8); 
            border-radius: 50%; 
            animation: steam-rise 1.5s infinite; 
            opacity: 0; 
            z-index: 0;
        }
        .s1 { left: 40px; animation-delay: 0.2s; } 
        .s2 { left: 60px; animation-delay: 0.8s; width: 25px; height: 25px; } 
        .s3 { left: 80px; animation-delay: 0.4s; }
        @keyframes steam-rise { 
            0% { transform: translateY(0) scale(0.5); opacity: 0; } 
            50% { opacity: 1; } 
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; } 
        }
        #loading-text { font-size: 26px; font-weight: bold; color: #FF9800; margin-top: 10px; }

        /* --- ✨ 은은한 음식 이모지 애니메이션 --- */
        #emoji-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; 
        }
        .floating-emoji {
            position: absolute; bottom: -50px; font-size: 30px; opacity: 0; animation: emoji-float 10s infinite ease-in-out;
        }
        .emoji-1 { left: 10%; animation-duration: 8s; opacity: 0.1; }
        .emoji-2 { left: 30%; animation-duration: 12s; opacity: 0.05; animation-delay: 2s; }
        .emoji-3 { left: 50%; animation-duration: 10s; opacity: 0.15; animation-delay: 4s; }
        .emoji-4 { left: 70%; animation-duration: 14s; opacity: 0.08; animation-delay: 1s; }
        .emoji-5 { left: 90%; animation-duration: 11s; opacity: 0.12; animation-delay: 5s; }
        .emoji-6 { left: 20%; animation-duration: 9s; opacity: 0.06; animation-delay: 3s; }
        .emoji-7 { left: 60%; animation-duration: 13s; opacity: 0.14; animation-delay: 6s; }
        .emoji-8 { left: 80%; animation-duration: 10s; opacity: 0.09; animation-delay: 7s; }

        @keyframes emoji-float {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; } 
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } 
        }

    </style>
</head>
<body>

    <audio id="cooking-bgm" src="cooking.mp3" loop></audio>

    <div id="app-container">
        <div id="emoji-background">
            <span class="floating-emoji emoji-1">🍕</span><span class="floating-emoji emoji-2">🍜</span>
            <span class="floating-emoji emoji-3">🍰</span><span class="floating-emoji emoji-4">🍣</span>
            <span class="floating-emoji emoji-5">🍔</span><span class="floating-emoji emoji-6">🍦</span>
            <span class="floating-emoji emoji-7">🍤</span><span class="floating-emoji emoji-8">🍡</span>
        </div>

        <div id="slider">
            <div class="screen" id="screen-start">
                <div class="logo-container">
                    <img src="logo_high.png" alt="뭐 먹지 로고" class="logo-img" onerror="this.src='https://placehold.co/200x200/FFCC00/ffffff?text=뭐+먹지'">
                    <div id="typing-container"><span id="typing-text"></span><span class="cursor"></span></div>
                </div>
                <button class="start-btn" onclick="nextScreen()">메뉴를 추천해줘!</button>
            </div>

            <div class="screen">
                <h2>식사 인원을 알려주세요!</h2>
                <input type="number" id="input-people" placeholder="예: 2" min="1">
                <button class="action-btn" onclick="saveAndNext('people', 'input-people')">다음</button>
            </div>

            <div class="screen">
                <h2>음식의 장르를 골라주세요</h2>
                <div class="btn-grid">
                    <button class="choice-btn" onclick="saveAndNext('cuisine', null, '한식')">🍚 한식</button>
                    <button class="choice-btn" onclick="saveAndNext('cuisine', null, '양식')">🍝 양식</button>
                    <button class="choice-btn" onclick="saveAndNext('cuisine', null, '중식')">🥢 중식</button>
                    <button class="choice-btn" onclick="saveAndNext('cuisine', null, '일식')">🍣 일식</button>
                    <button class="choice-btn" onclick="saveAndNext('cuisine', null, '디저트')">🍰 디저트</button>
                </div>
            </div>

            <div class="screen">
                <h2>음식의 스타일을 골라주세요</h2>
                <div class="btn-grid" id="style-btn-grid">
                    <button class="choice-btn" onclick="saveAndNext('style', null, '면')">🍜 면</button>
                    <button class="choice-btn" onclick="saveAndNext('style', null, '밥')">🍚 밥</button>
                    <button class="choice-btn" onclick="saveAndNext('style', null, '빵')">🍞 빵</button>
                </div>
            </div>

            <div class="screen">
                <h2>오늘은 어떤 맛이 끌리나요?</h2>
                <div class="btn-grid" id="flavor-btn-grid">
                    <button class="choice-btn" onclick="saveAndNext('flavor', null, '매운 맛')">🌶️ 매운 맛</button>
                    <button class="choice-btn" onclick="saveAndNext('flavor', null, '달달한 맛')">🍯 달달한 맛</button>
                    <button class="choice-btn" onclick="saveAndNext('flavor', null, '칼칼한 맛')">🍲 칼칼한 맛</button>
                    <button class="choice-btn" onclick="saveAndNext('flavor', null, '느끼한 맛')">🧀 느끼한 맛</button>
                    <button class="choice-btn" onclick="saveAndNext('flavor', null, '상큼한 맛')">🍋 상큼한 맛</button>
                    <button class="choice-btn" onclick="saveAndNext('flavor', null, '짠맛')">🧂 짠맛</button>
                    <button class="choice-btn" onclick="saveAndNext('flavor', null, '감칠맛')">🍄 감칠맛</button>
                </div>
            </div>

            <div class="screen">
                <h2>오늘 날씨는 어떤가요?</h2>
                <div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('weather', null, '맑음')">☀️ 맑음</button><button class="choice-btn" onclick="saveAndNext('weather', null, '흐림')">☁️ 흐림</button><button class="choice-btn" onclick="saveAndNext('weather', null, '비')">🌧️ 비</button><button class="choice-btn" onclick="saveAndNext('weather', null, '눈')">❄️ 눈</button></div>
            </div>

            <div class="screen">
                <h2>나이대를 선택해주세요</h2>
                <div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('age', null, '10대')">10대</button><button class="choice-btn" onclick="saveAndNext('age', null, '20대')">20대</button><button class="choice-btn" onclick="saveAndNext('age', null, '30대')">30대</button><button class="choice-btn" onclick="saveAndNext('age', null, '40대')">40대</button><button class="choice-btn" onclick="saveAndNext('age', null, '50대')">50대</button><button class="choice-btn" onclick="saveAndNext('age', null, '60대')">60대</button></div>
            </div>

            <div class="screen" id="screen-ingredient-input">
                <h2>먹고 싶은 식재료를 입력해주세요!</h2>
                <input type="text" id="input-ingredient" placeholder="예: 감자, 소고기">
                <button class="action-btn" onclick="handleIngredient()">입력 완료</button>
            </div>

            <div class="screen" id="screen-ingredient-confirm"><div id="ingredient-msg"></div></div>

            <div class="screen">
                <h2>혹시 알레르기가 있으신가요?</h2>
                <p style="color: #666; margin-top:-15px; margin-bottom: 20px;">알레르기가 있는 식재료를 입력해주세요!<br>(없다면 그냥 넘어가셔도 됩니다)</p>
                <input type="text" id="input-allergy" placeholder="예: 땅콩, 새우">
                <button class="action-btn" onclick="startCooking()">요리 시작하기</button>
            </div>

            <div class="screen">
                <div class="pot-container">
                    <div class="steam s1"></div><div class="steam s2"></div><div class="steam s3"></div>
                    <div class="pot-handle"></div><div class="pot-body"><div class="pot-face"></div><div class="pot-mouth"></div><div class="pot-blush"></div></div>
                    <div class="pot-lid"></div>
                </div>
                <div id="loading-text">👩‍🍳 음식을 만드는 중입니다!</div>
            </div>

            <div class="screen"><h2>오늘 이 음식 어떠세요?</h2><div id="result-container"></div><button class="action-btn" style="margin-top: 20px;" onclick="resetApp()">다시 추천받기 🔄</button></div>
        </div>
    </div>

    <script>
        const typingPhrases = ["오늘 점심 뭐 먹지? 🤔", "스트레스 팍! 풀리는 맛 🌶️", "결정장애를 위한 1분 미식 큐레이션! ✨", "당신만을 위한 AI 쉐프 👩‍🍳"];
        let phraseIndex = 0, charIndex = 0, isDeleting = false;
        function typeEffect() {
            const typingText = document.getElementById('typing-text');
            const currentPhrase = typingPhrases[phraseIndex];
            if (isDeleting) { typingText.innerText = currentPhrase.substring(0, charIndex - 1); charIndex--; }
            else { typingText.innerText = currentPhrase.substring(0, charIndex + 1); charIndex++; }
            let typingSpeed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentPhrase.length) { typingSpeed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; phraseIndex = (phraseIndex + 1) % typingPhrases.length; typingSpeed = 500; }
            setTimeout(typeEffect, typingSpeed);
        }
        window.onload = () => { typeEffect(); };

        const state = {};
        let currentIndex = 0;
        const slider = document.getElementById('slider'), bgm = document.getElementById('cooking-bgm');

        function nextScreen() { currentIndex++; slider.style.transform = `translateX(-${currentIndex * 100}vw)`; }

        function saveAndNext(key, inputId, directValue = null) {
            if (inputId) { const val = document.getElementById(inputId).value; if (!val) return alert("값을 입력해주세요!"); state[key] = val; }
            else if (directValue) { state[key] = directValue; }

            // 🔥 장르에 따른 스타일 버튼 동적 변경 로직
            if (key === 'cuisine') {
                const styleGrid = document.getElementById('style-btn-grid');
                if (state.cuisine === '디저트') {
                    styleGrid.innerHTML = `<button class="choice-btn" onclick="saveAndNext('style', null, '빵')">🍞 빵</button><button class="choice-btn" onclick="saveAndNext('style', null, '떡')">🍡 떡</button><button class="choice-btn" onclick="saveAndNext('style', null, '쿠키')">🍪 쿠키</button><button class="choice-btn" onclick="saveAndNext('style', null, '냉동 디저트')">🍦 냉동 디저트</button>`;
                } else if (state.cuisine === '한식' || state.cuisine === '일식') {
                    styleGrid.innerHTML = `<button class="choice-btn" onclick="saveAndNext('style', null, '면')">🍜 면</button><button class="choice-btn" onclick="saveAndNext('style', null, '밥')">🍚 밥</button><button class="choice-btn" onclick="saveAndNext('style', null, '전골')">🍲 전골</button>`;
                } else if (state.cuisine === '중식') {
                    styleGrid.innerHTML = `<button class="choice-btn" onclick="saveAndNext('style', null, '면')">🍜 면</button><button class="choice-btn" onclick="saveAndNext('style', null, '밥')">🍚 밥</button>`;
                } else {
                    styleGrid.innerHTML = `<button class="choice-btn" onclick="saveAndNext('style', null, '면')">🍜 면</button><button class="choice-btn" onclick="saveAndNext('style', null, '밥')">🍚 밥</button><button class="choice-btn" onclick="saveAndNext('style', null, '빵')">🍞 빵</button>`;
                }
            }

            // 디저트 맛 동적 로직
            if (key === 'style') {
                const flavorGrid = document.getElementById('flavor-btn-grid');
                if (state.cuisine === '디저트') {
                    flavorGrid.innerHTML = `<button class="choice-btn" onclick="saveAndNext('flavor', null, '달달한 맛')">🍯 달달한 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '상큼한 맛')">🍋 상큼한 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '부드러운 맛')">☁️ 부드러운 맛</button>`;
                } else {
                    flavorGrid.innerHTML = `<button class="choice-btn" onclick="saveAndNext('flavor', null, '매운 맛')">🌶️ 매운 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '달달한 맛')">🍯 달달한 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '칼칼한 맛')">🍲 칼칼한 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '느끼한 맛')">🧀 느끼한 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '상큼한 맛')">🍋 상큼한 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '짠맛')">🧂 짠맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '감칠맛')">🍄 감칠맛</button>`;
                }
            }
            nextScreen();
        }

        function handleIngredient() {
            const val = document.getElementById('input-ingredient').value;
            if (!val) return alert("식재료를 입력해주세요!");
            state['ingredient'] = val;
            const msgDiv = document.getElementById('ingredient-msg');
            msgDiv.style.display = 'flex';
            msgDiv.innerHTML = `<div style="font-size: 28px; margin-bottom: 10px;">알겠습니다!</div><div style="font-size: 20px;"><span style="color:#D32F2F;">'${val}'</span>(이)가 들어간<br>음식을 만들어 볼게요!</div>`;
            nextScreen(); setTimeout(() => { nextScreen(); }, 2000);
        }

        function startLoadingEffect() {
            const texts = ["👩‍🍳 음식을 만드는 중입니다!", "🔥 맛있게 불 조절 중...", "🥕 신선한 재료 손질 중...", "✨ 예쁜 그릇에 담는 중!"];
            let i = 0; const el = document.getElementById('loading-text');
            const interval = setInterval(() => { if (currentIndex !== 10) { clearInterval(interval); return; } i++; el.innerText = texts[i % texts.length]; }, 1200);
        }

        function startCooking() {
            state['allergy'] = document.getElementById('input-allergy').value || '없음';
            nextScreen(); startLoadingEffect();
            bgm.volume = 0.5; bgm.load(); 
            const playPromise = bgm.play();
            if (playPromise !== undefined) playPromise.catch(e => console.log("자동재생 제한됨"));
            fetchRecommendations();
        }

        async function fetchRecommendations() {
            const prompt = `인원(${state.people}명)을 최우선 고려해 메뉴 3개 추천. 1명은 혼밥, 2명은 커플, 3명 이상은 전골/플래터 위주. 이유에 "${state.people}명이서 먹기 좋은~" 언급 필수. 음식명 끝에 어울리는 이모지 포함. JSON 배열 [{name, reason}] 출력.`;
            try {
                const response = await fetch('/api/recommend', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt }) });
                const menuData = await response.json(); renderResults(menuData);
            } catch (error) { document.getElementById('result-container').innerHTML = "에러 발생!"; setTimeout(() => { bgm.pause(); nextScreen(); }, 1500); }
        }

        function renderResults(menuData) {
            const container = document.getElementById('result-container'), now = new Date();
            const dateStr = now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0');
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const orderNum = Math.floor(Math.random() * 900) + 100;
            let html = `<div class="receipt-paper"><div class="receipt-header"><div class="receipt-title">🧾 뭐 먹지 영수증</div><div class="receipt-info">DATE: ${dateStr} ${timeStr}</div><div class="receipt-info">ORDER NO: #${orderNum}</div><div class="receipt-info">GUEST: ${state.people}명</div></div><div class="receipt-body">`;
            const medals = ['🥇', '🥈', '🥉'];
            menuData.forEach((menu, index) => {
                const currentMedal = medals[index] || '🏅';
                html += `<div class="receipt-item"><div class="item-row"><span><span class="item-medal">${currentMedal}</span> ${menu.name}</span><span>1</span></div><div class="item-reason">${menu.reason}</div></div>`;
            });
            html += `</div><div class="receipt-footer"><div class="total-msg">맛있게 드세요! 🍽️</div><div class="barcode">|||| ||||| ||| |||</div></div></div>`;
            container.innerHTML = html; setTimeout(() => { bgm.pause(); nextScreen(); }, 1500);
        }

        function resetApp() { document.querySelectorAll('input').forEach(i => i.value = ''); for (let key in state) delete state[key]; currentIndex = 0; slider.style.transform = `translateX(0vw)`; }
    </script>
</body>
</html>
