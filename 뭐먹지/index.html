<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐 먹지 - 음식 추천</title>
    <link rel="shortcut icon" href="#"> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            background-color: #F9F9F9;
        }

        #app-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #slider {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .screen {
            flex: 0 0 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            word-break: keep-all;
        }

        /* 버튼 및 입력창 스타일 (기존 유지) */
        .start-btn { margin-top: 50px; font-size: 22px; padding: 15px 40px; border-radius: 30px; background-color: #FFCC00; color: #fff; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 8px 15px rgba(255, 204, 0, 0.4); transition: all 0.2s; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }
        .btn-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 500px; }
        .choice-btn { background-color: #fff; border: 2px solid #FFCC00; border-radius: 15px; padding: 15px 25px; font-size: 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; font-family: inherit; }
        .choice-btn:hover { background-color: #FFCC00; color: #fff; }
        input { padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; width: 80%; max-width: 300px; text-align: center; margin-bottom: 20px; font-family: inherit; }
        .action-btn { background-color: #FFCC00; color: #fff; border: none; border-radius: 10px; padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* --- ✨ 보글보글 냄비 애니메이션 스타일 --- */
        .cooking-pot {
            position: relative;
            width: 100px;
            height: 60px;
            background: #555;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            margin-bottom: 40px;
        }
        /* 냄비 뚜껑 */
        .pot-lid {
            position: absolute;
            top: -15px;
            left: 5px;
            width: 90px;
            height: 15px;
            background: #444;
            border-radius: 10px 10px 0 0;
            animation: lid-jump 0.5s infinite alternate;
        }
        @keyframes lid-jump {
            to { transform: translateY(-5px) rotate(3deg); }
        }
        /* 증기 효과 */
        .steam {
            position: absolute;
            top: -30px;
            width: 10px;
            height: 20px;
            background: rgba(200, 200, 200, 0.4);
            border-radius: 50%;
            filter: blur(5px);
            animation: steam-up 1.5s infinite;
        }
        .s1 { left: 20px; animation-delay: 0.2s; }
        .s2 { left: 45px; animation-delay: 0.7s; }
        .s3 { left: 70px; animation-delay: 0.4s; }
        @keyframes steam-up {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-40px) scale(2); opacity: 0; }
        }
        #loading-text { font-size: 20px; font-weight: bold; color: #555; margin-top: 10px; }

        /* --- 🧾 영수증 UI 스타일 (기존 유지) --- */
        #result-container { width: 100%; max-width: 400px; max-height: 65vh; overflow-y: auto; scrollbar-width: none; }
        .receipt-paper { background-color: #fdfdfd; padding: 30px 20px; margin: 10px auto; box-shadow: 0px 10px 25px rgba(0,0,0,0.1); position: relative; font-family: 'Courier Prime', monospace; text-align: left; color: #222; border-top: 4px solid #D32F2F; border-left: 1px solid #eee; border-right: 1px solid #eee; }
        .receipt-paper::after { content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 10px; background: linear-gradient(135deg, transparent 50%, #fdfdfd 50%), linear-gradient(-135deg, transparent 50%, #fdfdfd 50%); background-size: 15px 15px; }
        .receipt-header { text-align: center; border-bottom: 2px dashed #ccc; padding-bottom: 15px; margin-bottom: 20px; }
        .receipt-title { font-size: 24px; font-weight: bold; font-family: 'Noto Sans KR'; }
        .receipt-item { margin-bottom: 20px; }
        .item-row { display: flex; justify-content: space-between; font-size: 17px; font-weight: bold; margin-bottom: 6px; }
        .item-reason { font-size: 13px; color: #555; font-family: 'Noto Sans KR'; border-left: 2px solid #eee; padding-left: 5px; }
        .barcode { font-size: 30px; text-align: center; margin-top: 20px; opacity: 0.7; letter-spacing: 2px; }
    </style>
</head>
<body>

    <audio id="cooking-bgm" src="cooking.mp3" loop></audio>

    <div id="app-container">
        <div id="slider">
            
            <div class="screen">
                <img src="그림1.png" alt="로고" class="logo-img" onerror="this.src='https://placehold.co/200x200?text=Logo'">
                <button class="start-btn" onclick="nextScreen()">메뉴를 추천해줘!</button>
            </div>

            <div class="screen"><h2>인원수?</h2><input type="number" id="input-people" placeholder="예: 2"><button class="action-btn" onclick="saveAndNext('people', 'input-people')">다음</button></div>
            <div class="screen"><h2>장르?</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('cuisine', null, '한식')">한식</button><button class="choice-btn" onclick="saveAndNext('cuisine', null, '양식')">양식</button><button class="choice-btn" onclick="saveAndNext('cuisine', null, '중식')">중식</button></div></div>
            <div class="screen"><h2>스타일?</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('style', null, '면')">면</button><button class="choice-btn" onclick="saveAndNext('style', null, '밥')">밥</button></div></div>
            <div class="screen"><h2>맛?</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('flavor', null, '매운맛')">매운맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '달콤한맛')">달콤한맛</button></div></div>
            <div class="screen"><h2>날씨?</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('weather', null, '맑음')">맑음</button><button class="choice-btn" onclick="saveAndNext('weather', null, '비')">비</button></div></div>
            <div class="screen"><h2>나이대?</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('age', null, '20대')">20대</button><button class="choice-btn" onclick="saveAndNext('age', null, '30대')">30대</button></div></div>
            <div class="screen"><h2>식재료?</h2><input type="text" id="input-ingredient" placeholder="감자, 고기 등"><button class="action-btn" onclick="handleIngredient()">입력 완료</button></div>
            <div class="screen"><div id="ingredient-msg"></div></div>
            <div class="screen"><h2>알레르기?</h2><input type="text" id="input-allergy" placeholder="없으면 통과"><button class="action-btn" onclick="startCooking()">요리 시작!</button></div>

            <div class="screen">
                <div class="cooking-pot">
                    <div class="pot-lid"></div>
                    <div class="steam s1"></div>
                    <div class="steam s2"></div>
                    <div class="steam s3"></div>
                </div>
                <div id="loading-text">👨‍🍳 쉐프 클로드가 고민 중...</div>
            </div>

            <div class="screen">
                <h2>오늘의 추천 메뉴</h2>
                <div id="result-container"></div>
                <button class="action-btn" onclick="resetApp()">다시 하기 🔄</button>
            </div>

        </div>
    </div>

    <script>
        const state = {};
        let currentIndex = 0;
        const slider = document.getElementById('slider');
        const bgm = document.getElementById('cooking-bgm');

        function nextScreen() { currentIndex++; slider.style.transform = `translateX(-${currentIndex * 100}vw)`; }
        function saveAndNext(key, id, val) { state[key] = id ? document.getElementById(id).value : val; nextScreen(); }
        
        function handleIngredient() {
            state.ingredient = document.getElementById('input-ingredient').value;
            document.getElementById('ingredient-msg').innerHTML = `<h3>'${state.ingredient}' 요리 준비 완료!</h3>`;
            nextScreen(); setTimeout(nextScreen, 1500);
        }

        // 로딩 텍스트를 재미있게 바꿔주는 기능
        function startLoadingText() {
            const texts = ["🔥 불 조절 하는 중...", "🥕 재료 다듬는 중...", "✨ 예쁘게 담는 중...", "👨‍🍳 거의 다 됐어요!"];
            let i = 0;
            const interval = setInterval(() => {
                const el = document.getElementById('loading-text');
                if (currentIndex !== 9) { clearInterval(interval); return; } // 로딩 화면 아닐 때 멈춤
                el.innerText = texts[i % texts.length];
                i++;
            }, 800);
        }

        function startCooking() {
            state.allergy = document.getElementById('input-allergy').value || '없음';
            nextScreen();
            startLoadingText();
            bgm.play();
            fetchRecommendations();
        }

        async function fetchRecommendations() {
            const prompt = `인원(${state.people}), 장르(${state.cuisine}), 스타일(${state.style}), 맛(${state.flavor}), 날씨(${state.weather}), 나이(${state.age}), 식재료(${state.ingredient}), 제외(${state.allergy}) 기반 메뉴 3개 추천. JSON 배열로만 응답. [{medal, name, reason}]`;
            try {
                const res = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                renderResults(data);
            } catch (e) {
                document.getElementById('result-container').innerHTML = "에러 발생 ㅠㅠ";
                nextScreen();
            }
        }

        function renderResults(menuData) {
            const now = new Date();
            const container = document.getElementById('result-container');
            let html = `<div class="receipt-paper"><div class="receipt-header"><div class="receipt-title">🧾 뭐 먹지 영수증</div><div style="font-size:12px;color:#888;">${now.toLocaleString()}</div></div><div class="receipt-body">`;
            menuData.forEach(m => {
                html += `<div class="receipt-item"><div class="item-row"><span>${m.medal} ${m.name}</span><span>1</span></div><div class="item-reason">${m.reason}</div></div>`;
            });
            html += `</div><div class="barcode">|| ||| | ||| || ||</div></div>`;
            container.innerHTML = html;
            setTimeout(nextScreen, 1000);
        }

        function resetApp() { location.reload(); }
    </script>
</body>
</html>
