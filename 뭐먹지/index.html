<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐 먹지 - 음식 추천</title>
    <link rel="shortcut icon" href="#"> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            background-color: #F9F9F9;
        }

        #app-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #slider {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .screen {
            flex: 0 0 100vw; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            word-break: keep-all;
        }

        .logo-img {
            width: 200px;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .start-btn {
            margin-top: 50px;
            font-size: 22px;
            padding: 15px 40px;
            border-radius: 30px;
            background-color: #FFCC00;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 204, 0, 0.4);
            transition: all 0.2s;
            animation: bounce 2s infinite; 
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 500px;
        }
        .choice-btn {
            background-color: #fff;
            border: 2px solid #FFCC00;
            border-radius: 15px;
            padding: 15px 25px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .choice-btn:hover {
            background-color: #FFCC00;
            color: #fff;
        }

        input {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .action-btn {
            background-color: #FFCC00;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 204, 0, 0.3);
        }

        /* --- ✨ 보글보글 냄비 애니메이션 스타일 --- */
        .pot-container {
            position: relative;
            width: 120px;
            height: 100px;
            margin-bottom: 30px;
        }
        .pot-body {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #555;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }
        .pot-lid {
            position: absolute;
            top: 25px;
            left: 5%;
            width: 90%;
            height: 15px;
            background: #444;
            border-radius: 20px 20px 0 0;
            animation: lid-dance 0.4s infinite alternate;
        }
        @keyframes lid-dance {
            to { transform: translateY(-8px) rotate(4deg); }
        }
        .steam {
            position: absolute;
            top: 0;
            width: 12px;
            height: 25px;
            background: rgba(180, 180, 180, 0.4);
            border-radius: 50%;
            filter: blur(4px);
            animation: steam-rise 1.5s infinite;
            opacity: 0;
        }
        .s1 { left: 25px; animation-delay: 0.2s; }
        .s2 { left: 55px; animation-delay: 0.8s; }
        .s3 { left: 85px; animation-delay: 0.4s; }
        @keyframes steam-rise {
            0% { transform: translateY(20px) scale(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-50px) scale(2); opacity: 0; }
        }
        #loading-text {
            font-size: 20px;
            font-weight: bold;
            color: #555;
        }

        /* --- 🧾 영수증 UI 스타일 --- */
        #result-container {
            width: 100%;
            max-width: 400px;
            max-height: 65vh;
            overflow-y: auto;
            scrollbar-width: none; 
        }
        #result-container::-webkit-scrollbar { display: none; }

        .receipt-paper {
            background-color: #fdfdfd;
            padding: 30px 20px;
            margin: 10px auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
            position: relative;
            font-family: 'Courier Prime', monospace;
            text-align: left;
            color: #222;
            border: 1px solid #eaeaea;
            border-top: 4px solid #D32F2F;
        }
        .receipt-paper::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(135deg, transparent 50%, #fdfdfd 50%), linear-gradient(-135deg, transparent 50%, #fdfdfd 50%);
            background-size: 15px 15px;
        }
        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .receipt-title { font-size: 24px; font-weight: bold; font-family: 'Noto Sans KR'; margin-bottom: 10px; }
        .receipt-info { font-size: 13px; color: #666; margin: 3px 0; }
        .receipt-item { margin-bottom: 20px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; font-size: 17px; font-weight: bold; margin-bottom: 6px; }
        .item-reason { font-size: 13px; color: #555; line-height: 1.5; font-family: 'Noto Sans KR'; padding-left: 5px; border-left: 2px solid #eee; }
        .barcode { font-size: 35px; text-align: center; letter-spacing: 2px; opacity: 0.8; margin-top: 20px; }
    </style>
</head>
<body>

    <audio id="cooking-bgm" src="cooking.mp3" loop></audio>

    <div id="app-container">
        <div id="slider">
            
            <div class="screen">
                <img src="그림1.png" alt="로고" class="logo-img" onerror="this.src='https://placehold.co/200x200/FFCC00/ffffff?text=뭐+먹지'">
                <button class="start-btn" onclick="nextScreen()">메뉴를 추천해줘!</button>
            </div>

            <div class="screen"><h2>식사 인원을 알려주세요!</h2><input type="number" id="input-people" placeholder="예: 2"><button class="action-btn" onclick="saveAndNext('people', 'input-people')">다음</button></div>
            <div class="screen"><h2>음식의 장르를 골라주세요</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('cuisine', null, '한식')">한식</button><button class="choice-btn" onclick="saveAndNext('cuisine', null, '양식')">양식</button><button class="choice-btn" onclick="saveAndNext('cuisine', null, '중식')">중식</button><button class="choice-btn" onclick="saveAndNext('cuisine', null, '일식')">일식</button></div></div>
            <div class="screen"><h2>음식의 스타일을 골라주세요</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('style', null, '면')">면</button><button class="choice-btn" onclick="saveAndNext('style', null, '밥')">밥</button><button class="choice-btn" onclick="saveAndNext('style', null, '빵')">빵</button></div></div>
            <div class="screen"><h2>어떤 맛이 끌리나요?</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('flavor', null, '매운 맛')">매운 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '느끼한 맛')">느끼한 맛</button><button class="choice-btn" onclick="saveAndNext('flavor', null, '상큼한 맛')">상큼한 맛</button></div></div>
            <div class="screen"><h2>오늘 날씨는?</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('weather', null, '맑음')">맑음</button><button class="choice-btn" onclick="saveAndNext('weather', null, '비')">비</button></div></div>
            <div class="screen"><h2>나이대를 선택해주세요</h2><div class="btn-grid"><button class="choice-btn" onclick="saveAndNext('age', null, '20대')">20대</button><button class="choice-btn" onclick="saveAndNext('age', null, '30대')">30대</button></div></div>
            <div class="screen"><h2>식재료를 입력해주세요!</h2><input type="text" id="input-ingredient" placeholder="예: 감자, 소고기"><button class="action-btn" onclick="handleIngredient()">완료</button></div>
            <div class="screen"><div id="ingredient-msg" style="display:none; flex-direction:column; align-items:center; font-weight:bold; color:#FF9800;"></div></div>
            <div class="screen"><h2>알레르기가 있으신가요?</h2><input type="text" id="input-allergy" placeholder="없으면 패스"><button class="action-btn" onclick="startCooking()">요리 시작!</button></div>

            <div class="screen">
                <div class="pot-container">
                    <div class="steam s1"></div>
                    <div class="steam s2"></div>
                    <div class="steam s3"></div>
                    <div class="pot-body"></div>
                    <div class="pot-lid"></div>
                </div>
                <div id="loading-text">👩‍🍳 메뉴를 고민하고 있어요...</div>
            </div>

            <div class="screen">
                <h2>오늘 이 음식 어떠세요?</h2>
                <div id="result-container"></div>
                <button class="action-btn" style="margin-top: 20px;" onclick="resetApp()">다시 추천받기 🔄</button>
            </div>

        </div>
    </div>

    <script>
        const state = {};
        let currentIndex = 0;
        const slider = document.getElementById('slider');
        const bgm = document.getElementById('cooking-bgm');

        function nextScreen() {
            currentIndex++;
            slider.style.transform = `translateX(-${currentIndex * 100}vw)`;
        }

        function saveAndNext(key, inputId, directValue = null) {
            state[key] = inputId ? document.getElementById(inputId).value : directValue;
            if (inputId && !state[key]) return alert("값을 입력해주세요!");
            nextScreen();
        }

        function handleIngredient() {
            state['ingredient'] = document.getElementById('input-ingredient').value;
            const msgDiv = document.getElementById('ingredient-msg');
            msgDiv.style.display = 'flex';
            msgDiv.innerHTML = `<span>'${state['ingredient']}' 준비 완료!</span><br><span>맛있게 만들어 드릴게요!</span>`;
            nextScreen(); 
            setTimeout(nextScreen, 2000);
        }

        // 로딩 문구 자동 변경 함수
        function startLoadingEffect() {
            const texts = ["👩‍🍳 메뉴를 고민하고 있어요...", "🔥 불 조절을 하고 있어요...", "🥕 재료를 손질하고 있어요...", "✨ 예쁜 그릇을 꺼내고 있어요!"];
            let i = 0;
            const interval = setInterval(() => {
                if (currentIndex !== 9) { clearInterval(interval); return; }
                document.getElementById('loading-text').innerText = texts[i % texts.length];
                i++;
            }, 1000);
        }

        function startCooking() {
            state['allergy'] = document.getElementById('input-allergy').value || '없음';
            nextScreen(); 
            startLoadingEffect();
            bgm.play().catch(e => console.log("BGM 재생 막힘"));
            fetchRecommendations();
        }

        async function fetchRecommendations() {
            const prompt = `인원(${state.people}), 장르(${state.cuisine}), 스타일(${state.style}), 맛(${state.flavor}), 날씨(${state.weather}), 나이대(${state.age}), 식재료(${state.ingredient}), 알레르기(${state.allergy}) 기반 메뉴 3개 추천. JSON 배열로만 응답. [{medal, name, reason}]`;
            try {
                const response = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const menuData = await response.json();
                renderResults(menuData);
            } catch (error) {
                document.getElementById('result-container').innerHTML = `<div style="color:red; font-weight:bold;">🚨 서버 통신 에러!</div>`;
                setTimeout(nextScreen, 1500);
            }
        }

        function renderResults(menuData) {
            const container = document.getElementById('result-container');
            const now = new Date();
            const dateStr = now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0');
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            const orderNum = Math.floor(Math.random() * 900) + 100;

            let html = `
                <div class="receipt-paper">
                    <div class="receipt-header">
                        <div class="receipt-title">🧾 뭐 먹지 영수증</div>
                        <div class="receipt-info">DATE: ${dateStr} ${timeStr}</div>
                        <div class="receipt-info">ORDER NO: #${orderNum}</div>
                        <div class="receipt-info">GUEST: ${state.people}명</div>
                    </div>
                    <div class="receipt-body">
            `;

            menuData.forEach(menu => {
                html += `
                    <div class="receipt-item">
                        <div class="item-row"><span>${menu.medal} ${menu.name}</span><span>1</span></div>
                        <div class="item-reason">${menu.reason}</div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="receipt-footer">
                        <div style="text-align:center; font-weight:bold; color:#D32F2F;">맛있게 드세요! 🍽️</div>
                        <div class="barcode">|||| ||||| ||| |||</div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            setTimeout(nextScreen, 1500);
        }

        function resetApp() { location.reload(); }
    </script>
</body>
</html>
